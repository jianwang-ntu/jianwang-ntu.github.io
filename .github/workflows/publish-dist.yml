name: Publish dist branch

# Whenever master moves, build the static site and force-push the contents
# of dist/ to the `dist` branch as a single orphan commit. This branch is
# what the self-hosted nginx host pulls (see README's "Self-hosted nginx"
# section) — keeping it in lockstep with master means a merge of any PR
# (blog post or otherwise) flows through to the deployed site.

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: publish-dist
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build

      # SPA fallback — same trick as the Pages workflow.
      - run: cp dist/index.html dist/404.html

      - name: Force-push dist/ to the dist branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd dist
          git init -q -b dist
          git config user.name  "publish-dist[bot]"
          git config user.email "publish-dist@users.noreply.github.com"
          git add -A
          git commit -q -m "Publish dist for ${GITHUB_SHA::7}"
          git push --force \
            "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" \
            HEAD:dist
