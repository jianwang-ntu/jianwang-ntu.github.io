name: Publish dist branches

# Whenever master moves, build the static site and force-push the contents
# of dist/ to BOTH `dist` and `dist_remote` as orphan commits. The two
# branches are different deployment targets (a local mirror and the remote
# nginx host) but should always carry identical content — keeping them in
# lockstep with master means a merge of any PR flows through to both.

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: publish-dist
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build

      # SPA fallback — same trick as the Pages workflow.
      - run: cp dist/index.html dist/404.html

      # Tell GitHub Pages / static hosts to skip Jekyll. Without this any
      # path containing `_` (none today, but cheap insurance) gets dropped
      # by Jekyll's default rules. dist_remote already had this file; mirror
      # the convention into dist too.
      - run: touch dist/.nojekyll

      - name: Force-push dist/ to both deploy branches
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd dist
          git init -q -b publish
          git config user.name  "publish-dist[bot]"
          git config user.email "publish-dist@users.noreply.github.com"
          git add -A
          git commit -q -m "Publish dist for ${GITHUB_SHA::7}"
          for ref in dist dist_remote; do
            git push --force \
              "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" \
              "publish:${ref}"
          done
