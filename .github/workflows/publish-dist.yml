name: Publish dist branches

# Whenever master moves, build the static site and force-push two orphan
# commits — one to `dist`, one to `dist_remote`. They differ only in how
# image URLs are resolved:
#
#   dist        → served by GitHub Pages itself; image refs stay relative
#                 (`/images/...`).
#   dist_remote → served by a self-hosted nginx on another machine; image
#                 refs are rewritten to absolute CDN URLs pointing at
#                 GitHub Pages (`https://<owner>.github.io/images/...`),
#                 and the local `images/` directory is dropped so the
#                 remote host doesn't have to store the assets.
#
# Everything else (HTML, JS bundles, CSS, blog markdown, PDFs in data/)
# is identical between the two branches.

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: publish-dist
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build

      # SPA fallback — same trick as the Pages workflow.
      - run: cp dist/index.html dist/404.html

      # Tell GitHub Pages / static hosts to skip Jekyll. Without this any
      # path containing `_` (none today, but cheap insurance) gets dropped
      # by Jekyll's default rules. dist_remote already had this file; mirror
      # the convention into dist too.
      - run: touch dist/.nojekyll

      - name: Build CDN-rewritten copy for dist_remote
        # Make a sibling tree of dist/ that loads images from GH Pages instead
        # of the nginx host. Match `/images/` as a path component preceded by
        # a quote, paren, or =, so we never touch unrelated text. Targets
        # only HTML/JS/CSS — markdown and JSON/PDF assets stay untouched.
        env:
          PAGES_BASE: https://${{ github.repository_owner }}.github.io
        run: |
          rm -rf dist-cdn
          cp -r dist dist-cdn
          find dist-cdn -type f \( -name '*.html' -o -name '*.js' -o -name '*.css' -o -name '*.md' \) \
            -print0 \
          | xargs -0 sed -i \
              -e "s|\"/images/|\"${PAGES_BASE}/images/|g" \
              -e "s|'/images/|'${PAGES_BASE}/images/|g" \
              -e "s|(/images/|(${PAGES_BASE}/images/|g" \
              -e "s|=/images/|=${PAGES_BASE}/images/|g"
          # Drop the local copy of images — they now load from the CDN.
          rm -rf dist-cdn/images

      - name: Force-push to dist and dist_remote
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          publish_orphan() {
            local src="$1" ref="$2" label="$3"
            ( cd "$src"
              git init -q -b publish
              git config user.name  "publish-dist[bot]"
              git config user.email "publish-dist@users.noreply.github.com"
              git add -A
              git commit -q -m "Publish ${label} for ${GITHUB_SHA::7}"
              git push --force \
                "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" \
                "publish:${ref}"
            )
          }
          publish_orphan dist     dist        dist
          publish_orphan dist-cdn dist_remote dist_remote
