# Drop into /etc/nginx/sites-available/ on the 4-vCPU host.
# Only serves the contents of `dist/` produced by `npm run build`.
server {
  listen 80;
  server_name _;

  root /var/www/wjhome/dist;
  index index.html;

  # Clean-URL routing: any unknown path falls back to index.html so
  # react-router can resolve /home, /pubs, /work, /cv on first hit.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Long-cache hashed assets (Vite emits content-hashed filenames).
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    access_log off;
  }

  # PDFs, headshots, etc. — short cache, easy to rotate.
  location ~* \.(pdf|png|jpg|jpeg|webp|ico|svg)$ {
    expires 7d;
    add_header Cache-Control "public";
  }

  # gzip
  gzip on;
  gzip_comp_level 6;
  gzip_min_length 1024;
  gzip_types text/plain text/css application/json application/javascript text/javascript image/svg+xml;
}
